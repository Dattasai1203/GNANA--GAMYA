# ═══════════════════════════════════════════════════════════════
#  Gnana Gamya — Gazebo ↔ ROS 2 Topic Bridge Configuration
#  Used by: ros_gz_bridge (parameter_bridge)
#
#  Direction key:
#    GZ_TO_ROS  — Gazebo publishes, ROS 2 subscribes
#    ROS_TO_GZ  — ROS 2 publishes, Gazebo subscribes
# ═══════════════════════════════════════════════════════════════

# ── Simulation clock ────────────────────────────────────────────
- ros_topic_name: "clock"
  gz_topic_name:  "clock"
  ros_type_name:  "rosgraph_msgs/msg/Clock"
  gz_type_name:   "gz.msgs.Clock"
  direction: GZ_TO_ROS

# ── LiDAR scan (Sensors plugin) ─────────────────────────────────
- ros_topic_name: "scan"
  gz_topic_name:  "scan"
  ros_type_name:  "sensor_msgs/msg/LaserScan"
  gz_type_name:   "gz.msgs.LaserScan"
  direction: GZ_TO_ROS

# ── Camera info (Sensors plugin) ────────────────────────────────
- ros_topic_name: "camera/camera_info"
  gz_topic_name:  "camera/camera_info"
  ros_type_name:  "sensor_msgs/msg/CameraInfo"
  gz_type_name:   "gz.msgs.CameraInfo"
  direction: GZ_TO_ROS

# ── Odometry (DiffDrive plugin) ──────────────────────────────────
- ros_topic_name: "odom"
  gz_topic_name:  "odom"
  ros_type_name:  "nav_msgs/msg/Odometry"
  gz_type_name:   "gz.msgs.Odometry"
  direction: GZ_TO_ROS

# ── TF transform (DiffDrive plugin) ─────────────────────────────
- ros_topic_name: "tf"
  gz_topic_name:  "tf"
  ros_type_name:  "tf2_msgs/msg/TFMessage"
  gz_type_name:   "gz.msgs.Pose_V"
  direction: GZ_TO_ROS

# ── Velocity command (DiffDrive plugin) ─────────────────────────
# Note: remapped to /diff_cont/cmd_vel_unstamped by twist_mux
- ros_topic_name: "diff_cont/cmd_vel_unstamped"
  gz_topic_name:  "cmd_vel"
  ros_type_name:  "geometry_msgs/msg/Twist"
  gz_type_name:   "gz.msgs.Twist"
  direction: ROS_TO_GZ

# ── Joint states (JointStatePublisher plugin) ────────────────────
- ros_topic_name: "joint_states"
  gz_topic_name:  "joint_states"
  ros_type_name:  "sensor_msgs/msg/JointState"
  gz_type_name:   "gz.msgs.Model"
  direction: GZ_TO_ROS
